<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AUTOMAT Framework — Prompt Builder</title>

<!-- Global fonts, reset, keyframes -->
<link rel="stylesheet" href="./automat-framework.css">

<style>
  .container { max-width: 780px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  .header { text-align: center; padding-top: 40px; margin-bottom: 12px; }
  .title-row {
    display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;
  }
  .title-text {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 22px; color: #1a1a2e;
  }
  .title-text:first-child { margin-right: 8px; }
  .title-text:last-child  { margin-left: 8px; }
  .subtitle {
    color: #666; font-size: 15px; max-width: 520px;
    margin: 0 auto; line-height: 1.6;
  }

  /* Letter Badge */
  .badge {
    width: 38px; height: 38px; min-width: 38px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 19px;
    font-family: 'DM Serif Display', Georgia, serif;
  }
  .badge-lg { width: 40px; height: 40px; min-width: 40px; font-size: 20px; }

  /* Progress */
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    margin: 24px auto 32px; max-width: 780px; padding: 0 24px;
  }
  .progress-track {
    flex: 1; height: 8px; background: #e0dcd4;
    border-radius: 100px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 100px;
    background: linear-gradient(90deg, #E74C3C, #E67E22, #F1C40F, #2ECC71, #3498DB, #9B59B6, #1ABC9C);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-label { font-size: 13px; font-weight: 600; color: #888; white-space: nowrap; }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 20px; padding-bottom: 8px; }
  .card {
    background: #fff; border-radius: 16px; border: 2px solid #e8e8e8;
    overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.active { box-shadow: 0 8px 32px rgba(0,0,0,0.06); }

  .card-header {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 24px 16px; border-bottom: 1px solid #f0f0f0;
  }
  .card-title {
    font-weight: 700; font-size: 17px; color: #1a1a2e;
    font-family: 'DM Serif Display', Georgia, serif; letter-spacing: -0.01em;
  }
  .card-desc { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.5; }
  .card-step {
    font-size: 11px; font-weight: 700; color: #fff;
    border-radius: 20px; padding: 3px 10px;
    letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap;
  }

  .card-input { padding: 16px 24px; }
  .card-input textarea {
    width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px;
    padding: 12px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    line-height: 1.6; resize: vertical; outline: none;
    transition: border-color 0.2s, background 0.2s;
    background: #fafafa; color: #1a1a2e;
  }
  .card-input textarea:focus { background: #fff; }

  /* Examples */
  .examples-toggle { padding: 0 24px 16px; }
  .toggle-btn {
    background: none; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 6px; padding: 4px 0;
  }
  .toggle-arrow { display: inline-block; font-size: 12px; transition: transform 0.2s; }
  .toggle-arrow.open { transform: rotate(90deg); }

  .examples-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-top: 12px; animation: fadeSlide 0.3s ease;
  }
  .examples-do {
    background: #f0faf0; border-radius: 10px; padding: 12px 14px;
    border: 1px solid #c8e6c9;
  }
  .examples-dont {
    background: #fef0f0; border-radius: 10px; padding: 12px 14px;
    border: 1px solid #ffcdd2;
  }
  .examples-heading {
    font-size: 12px; font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .examples-heading.do   { color: #2e7d32; }
  .examples-heading.dont { color: #c62828; }
  .example-item {
    font-size: 13px; line-height: 1.5; padding: 4px 6px;
    font-family: 'IBM Plex Mono', monospace;
    border-radius: 6px; transition: all 0.2s; margin: 2px -6px;
  }
  .example-item.do {
    color: #1a5e2a; cursor: pointer; position: relative; padding-left: 22px;
  }
  .example-item.do::before {
    content: '+'; position: absolute; left: 6px; top: 3px;
    font-weight: 700; font-size: 14px; color: #2e7d3288;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .example-item.do:hover           { background: #d4edda; color: #145a24; }
  .example-item.do:hover::before   { color: #2e7d32; transform: scale(1.2); }
  .example-item.do:active          { transform: scale(0.97); }
  .example-item.do.clicked         { background: #2e7d32; color: #fff; }
  .example-item.do.clicked::before { color: #fff; content: '✓'; }
  .example-item.dont { color: #8b1a1a; padding-left: 22px; position: relative; }
  .example-item.dont::before {
    content: '✗'; position: absolute; left: 6px; top: 4px;
    font-weight: 700; font-size: 11px; color: #c6282888;
    font-family: 'DM Sans', sans-serif;
  }

  /* Action buttons */
  .actions {
    display: flex; gap: 12px; justify-content: center;
    padding: 32px 24px; max-width: 780px; margin: 0 auto;
  }
  .btn-reset {
    padding: 14px 32px; border-radius: 12px; border: 2px solid #ccc;
    background: #fff; color: #666; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .btn-reset:hover { border-color: #999; color: #333; }
  .btn-generate {
    padding: 14px 40px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #E74C3C, #9B59B6, #1ABC9C);
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 4px 20px rgba(155, 89, 182, 0.3);
    transition: all 0.3s; letter-spacing: 0.02em;
  }
  .btn-generate:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

  /* Prompt output */
  .prompt-output {
    max-width: 780px; margin: 0 auto 60px; padding: 0 24px;
    animation: popIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .prompt-box {
    background: #1a1a2e; border-radius: 16px; overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.15);
  }
  .prompt-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid #2a2a4e;
  }
  .prompt-dots { display: flex; align-items: center; gap: 10px; }
  .dot         { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red     { background: #ff5f56; }
  .dot-yellow  { background: #ffbd2e; }
  .dot-green   { background: #27c93f; }
  .prompt-label {
    color: #888; font-size: 13px; font-weight: 600; margin-left: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .btn-copy {
    background: #2a2a4e; border: none; color: #fff;
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .btn-copy.copied { background: #27c93f; }
  .prompt-content { padding: 24px; max-height: 500px; overflow-y: auto; }
  .prompt-content pre {
    color: #e0e0e0; font-size: 14px; font-family: 'IBM Plex Mono', monospace;
    line-height: 1.7; white-space: pre-wrap; word-break: break-word; margin: 0;
  }

  @media (max-width: 600px) {
    .examples-grid { grid-template-columns: 1fr; }
    .badge { width: 32px; height: 32px; min-width: 32px; font-size: 16px; }
    .card-title { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="header container">
  <div class="title-row">
    <span class="title-text">The</span>
    <div class="badge" style="background:#E74C3C; box-shadow:0 3px 12px #E74C3C55">A</div>
    <div class="badge" style="background:#E67E22; box-shadow:0 3px 12px #E67E2255">U</div>
    <div class="badge" style="background:#F1C40F; box-shadow:0 3px 12px #F1C40F55">T</div>
    <div class="badge" style="background:#2ECC71; box-shadow:0 3px 12px #2ECC7155">O</div>
    <div class="badge" style="background:#3498DB; box-shadow:0 3px 12px #3498DB55">M</div>
    <div class="badge" style="background:#9B59B6; box-shadow:0 3px 12px #9B59B655">A</div>
    <div class="badge" style="background:#1ABC9C; box-shadow:0 3px 12px #1ABC9C55">T</div>
    <span class="title-text">Framework</span>
  </div>
  <p class="subtitle">Compose structured AI prompts step by step. Fill in each section below, then generate your complete prompt.</p>
</div>

<div class="progress-row">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  <span class="progress-label" id="progressLabel">0/7</span>
</div>

<div class="container">
  <div class="cards" id="cardsContainer"></div>
</div>

<div class="actions">
  <button class="btn-reset" onclick="resetAll()">Reset All</button>
  <button class="btn-generate" id="btnGenerate" onclick="generatePrompt()" disabled>Generate Prompt ✨</button>
</div>

<div id="promptArea"></div>

<script>
// NOTE: SECTIONS and LABELS are duplicated here so this file works from file://.
// The canonical source is data/sections.js — keep them in sync.
const SECTIONS = [
  {
    letter: "A", color: "#E74C3C", bg: "#FDE8E8",
    title: "Act as\u2026, Bot Persona",
    description: "Define the bot persona of the AI assistant just in a few words.",
    placeholder: "e.g. Act as a senior Java architect with 20 years of experience in enterprise systems\u2026",
    doTitle: "Be very specific in your description.",
    doExamples: [
      "Act as a sensitive elderly psychotherapist \u2026",
      "Act as a patient support staff \u2026",
      "Act as a professional journalist \u2026",
      "Act as a pebble, a car in love with its driver \u2026",
      "Act as a 4th grader math tutor \u2026",
      "Act as a csh-terminal on the mac \u2026",
    ],
    dontTitle: "Don\u2019t describe a behaviour that the AI exhibits anyway.",
    dontExamples: ["Act as a helpful AI \u2026"],
  },
  {
    letter: "U", color: "#E67E22", bg: "#FEF3E2",
    title: "User Persona, Audience",
    description: "Describe the audience, their background, the expected level of knowledge of the recipients in a few words.",
    placeholder: "e.g. Explain it like to a senior backend engineer familiar with Spring Boot and microservices\u2026",
    doTitle: "Describe the audience.",
    doExamples: [
      "Explain it like to someone with an MSc in software engineering \u2026",
      "\u2026 like to a 5-year-old child",
      "\u2026 to the owner of the Tesla model S \u2026",
    ],
    dontTitle: "Don\u2019t be unspecific about the audience.",
    dontExamples: ["\u2026 tell me \u2026", "\u2026 to the user \u2026"],
  },
  {
    letter: "T", color: "#F1C40F", bg: "#FEF9E7",
    title: "Targeted Action",
    description: "Use a meaningful verb and objects describing the transformation from input to output or the way the model should produce or create the output.",
    placeholder: "e.g. Summarize the key differences between Java 17 and Java 21, focusing on virtual threads and pattern matching\u2026",
    doTitle: "Describe the task.",
    doExamples: [
      "\u2026 summarize \u2026", "\u2026 list \u2026", "\u2026 translate \u2026", "\u2026 classify \u2026",
      "\u2026 explain \u2026", "\u2026 extract \u2026", "\u2026 format \u2026", "\u2026 comment \u2026",
      "\u2026 document the code \u2026",
    ],
    dontTitle: "Avoid using verbs like \u201canswer\u201d.",
    dontExamples: ["\u2026 answer the question \u2026", "\u2026 write a \u2026", "\u2026 give me \u2026"],
  },
  {
    letter: "O", color: "#2ECC71", bg: "#E8F8F0",
    title: "Output Definition",
    description: "The output can be described in a separate section in great detail.",
    placeholder: "e.g. A comparison table with columns: Feature, Java 17, Java 21, Migration Notes\u2026",
    doTitle: "Describe the output.",
    doExamples: [
      "\u2026 a list of steps \u2026", "\u2026 a formula \u2026", "\u2026 a table \u2026",
      "\u2026 python code \u2026", "\u2026 a JSON \u2026",
      "\u2026 a floating-point number between 0.0 and 1.0 \u2026",
      "\u2026 a recipe with a list of ingredients for 4 persons \u2026",
      "\u2026 a list of two-letter ISO country codes \u2026",
      "\u2026 an iambic pentameter \u2026",
    ],
    dontTitle: "Don\u2019t be too general.",
    dontExamples: ["\u2026 an answer \u2026", "\u2026 a text \u2026", "\u2026 a few \u2026"],
  },
  {
    letter: "M", color: "#3498DB", bg: "#E8F4FD",
    title: "Mode / Tonality / Style",
    description: "Define the way the model should convey the message. This can help with conversational utterances and text output for human users.",
    placeholder: "e.g. Use a confident, technical tone. Be concise but thorough. Avoid filler words\u2026",
    doTitle: "Describe the mode/tone/style.",
    doExamples: [
      "\u2026 empathetic \u2026", "\u2026 confident \u2026", "\u2026 aggressive \u2026", "\u2026 moaning \u2026",
      "\u2026 sarcastic \u2026", "\u2026 witty \u2026", "\u2026 stuttering \u2026",
      "\u2026 Hemingway style \u2026", "\u2026 like in a legal text \u2026",
    ],
    dontTitle: "Don\u2019t describe a behaviour the AI tries to exhibit anyway.",
    dontExamples: ["\u2026 friendly \u2026", "\u2026 neutral \u2026", "\u2026 smart \u2026", "\u2026 intelligent \u2026"],
  },
  {
    letter: "A", color: "#9B59B6", bg: "#F3E8FD",
    title: "Atypical Cases",
    description: "Handle edge cases for prompts used in applications or repeated requests.",
    placeholder: "e.g. If the Java version is not specified, assume Java 21. If a feature doesn\u2019t exist in the target version, note the minimum version required\u2026",
    doTitle: "Describe atypical, edge cases.",
    doExamples: [
      "\u2026 list movies in a table. If \u201cdirector\u201d or \u201crelease date\u201d is missing, put \u201c-\u201d. If the title is unknown, skip it.",
      "\u2026 if the answer is not in the provided context, tell the user you can\u2019t answer \u2026",
      "\u2026 if the category is not \u201coffer\u201d, \u201cconfirmation\u201d, \u201creceipt\u201d, set it as \u201cNULL\u201d \u2026",
      "\u2026 if the question is off-topic, say you can only discuss John Deere tractors \u2026",
      "\u2026 if the user gives feedback instead of a question, do xyz \u2026",
    ],
    dontTitle: "Don\u2019t forget to say what to do if an assumption is wrong.",
    dontExamples: [
      "\u2026 answer only on your knowledge \u2026 > and if you don\u2019t know?",
      "\u2026 translate English to French \u2026 > what if input is already French?",
    ],
  },
  {
    letter: "T", color: "#1ABC9C", bg: "#E8FAF6",
    title: "Topic Whitelisting",
    description: "When building a conversational system, you may want to restrict which topics the model can discuss.",
    placeholder: "e.g. Answer only questions about Java, JVM internals, build tools (Maven/Gradle), and related frameworks\u2026",
    doTitle: "List permitted conversation topics.",
    doExamples: [
      "\u2026 answer only questions regarding the CRB2004, its features and operations. Comment on user feedback and tell the user about your capabilities.",
    ],
    dontTitle: "Don\u2019t tell the model what NOT to talk about \u2014 the list won\u2019t be exhaustive.",
    dontExamples: [
      "\u2026 don\u2019t talk about politics, religion, race \u2026 > but talking about hacking is fine?",
    ],
  },
];

const LABELS = ["Bot Persona","Audience","Task","Output Format","Tone & Style","Edge Cases","Topic Scope"];

// ── Helpers ───────────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function capitalize(str) {
  if (!str) return str;
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// ── DOM construction ──────────────────────────────────────────────────────────

function buildCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = SECTIONS.map((s, i) => `
    <div class="card" id="card-${i}">
      <div class="card-header" style="background: linear-gradient(135deg, ${s.bg}88, ${s.bg}33)">
        <div class="badge badge-lg" style="background:${s.color}; box-shadow:0 3px 12px ${s.color}55">${s.letter}</div>
        <div style="flex:1">
          <div class="card-title">${escapeHtml(s.title)}</div>
          <div class="card-desc">${escapeHtml(s.description)}</div>
        </div>
        <div class="card-step" style="background:${s.color}">${i + 1} / 7</div>
      </div>
      <div class="card-input">
        <textarea id="input-${i}" rows="3" placeholder="${escapeHtml(s.placeholder)}"
          onfocus="activateCard(${i})" oninput="updateProgress()"></textarea>
      </div>
      <div class="examples-toggle">
        <button class="toggle-btn" style="color:${s.color}" onclick="toggleExamples(${i})">
          <span class="toggle-arrow" id="arrow-${i}">▶</span>
          <span id="toggleText-${i}">Show examples &amp; tips</span>
        </button>
        <div id="examples-${i}" style="display:none">
          <div class="examples-grid">
            <div class="examples-do">
              <div class="examples-heading do"><span style="font-size:14px">✓</span> ${escapeHtml(s.doTitle)}</div>
              ${s.doExamples.map((ex, j) => `<div class="example-item do" onclick="appendExample(${i}, ${j}, this)" title="Click to add to prompt">${escapeHtml(ex)}</div>`).join('')}
            </div>
            <div class="examples-dont">
              <div class="examples-heading dont"><span style="font-size:14px">✗</span> ${escapeHtml(s.dontTitle)}</div>
              ${s.dontExamples.map(ex => `<div class="example-item dont">${escapeHtml(ex)}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── Card interaction ──────────────────────────────────────────────────────────

function activateCard(index) {
  document.querySelectorAll('.card').forEach((c, i) => {
    if (i === index) {
      c.classList.add('active');
      c.style.borderColor = SECTIONS[i].color;
      c.style.boxShadow = `0 8px 32px ${SECTIONS[i].color}22, 0 2px 8px rgba(0,0,0,0.06)`;
    } else {
      c.classList.remove('active');
      c.style.borderColor = '#e8e8e8';
      c.style.boxShadow = '0 2px 8px rgba(0,0,0,0.04)';
    }
  });
  const ta = document.getElementById(`input-${index}`);
  ta.style.borderColor = SECTIONS[index].color;
  ta.style.background = '#fff';
}

function toggleExamples(index) {
  const el    = document.getElementById(`examples-${index}`);
  const arrow = document.getElementById(`arrow-${index}`);
  const text  = document.getElementById(`toggleText-${index}`);
  const open  = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  arrow.classList.toggle('open', open);
  text.textContent = open ? 'Hide examples & tips' : 'Show examples & tips';
}

function appendExample(sectionIndex, exampleIndex, el) {
  const ta      = document.getElementById(`input-${sectionIndex}`);
  const text    = SECTIONS[sectionIndex].doExamples[exampleIndex];
  const clean   = text.replace(/^…\s*/g, '').replace(/\s*…$/g, '').trim();
  const current = ta.value.trim();

  if (current) {
    if (current.toLowerCase().includes(clean.toLowerCase())) {
      el.style.background = '#ffcdd2';
      el.style.color = '#c62828';
      setTimeout(() => { el.style.background = ''; el.style.color = ''; }, 600);
      return;
    }
    const lastChar = current.slice(-1);
    if (['.', '!', '?', ';', ':'].includes(lastChar)) {
      ta.value = current + ' ' + capitalize(clean);
    } else if (lastChar === ',') {
      ta.value = current + ' ' + clean;
    } else {
      ta.value = current + '. ' + capitalize(clean);
    }
  } else {
    ta.value = capitalize(clean);
  }

  el.classList.add('clicked');
  setTimeout(() => el.classList.remove('clicked'), 700);

  activateCard(sectionIndex);
  updateProgress();

  ta.style.height = 'auto';
  ta.style.height = Math.max(ta.scrollHeight, 72) + 'px';
}

// ── Progress & state ──────────────────────────────────────────────────────────

function getValues() {
  return SECTIONS.map((_, i) => document.getElementById(`input-${i}`).value.trim());
}

function updateProgress() {
  const vals   = getValues();
  const filled = vals.filter(v => v).length;
  document.getElementById('progressFill').style.width = `${(filled / 7) * 100}%`;
  document.getElementById('progressLabel').textContent = `${filled}/7`;
  document.getElementById('btnGenerate').disabled = filled === 0;
}

function buildPrompt() {
  const vals  = getValues();
  const parts = [];
  vals.forEach((v, i) => { if (v) parts.push(`## ${LABELS[i]}\n${v}`); });
  return parts.join('\n\n');
}

// ── Actions ───────────────────────────────────────────────────────────────────

function generatePrompt() {
  const prompt = buildPrompt();
  if (!prompt) return;

  const area = document.getElementById('promptArea');
  area.innerHTML = `
    <div class="prompt-output">
      <div class="prompt-box">
        <div class="prompt-header">
          <div class="prompt-dots">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
            <span class="prompt-label">Generated Prompt</span>
          </div>
          <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">Copy</button>
        </div>
        <div class="prompt-content">
          <pre>${escapeHtml(prompt)}</pre>
        </div>
      </div>
    </div>
  `;
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPrompt() {
  navigator.clipboard.writeText(buildPrompt()).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function resetAll() {
  SECTIONS.forEach((_, i) => { document.getElementById(`input-${i}`).value = ''; });
  document.getElementById('promptArea').innerHTML = '';
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('active');
    c.style.borderColor = '#e8e8e8';
    c.style.boxShadow = '0 2px 8px rgba(0,0,0,0.04)';
  });
  updateProgress();
}
